<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Analysis #{{ item.id }}</title>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; margin: 24px; }
      .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
      a { color: #0b57d0; text-decoration: none; }
      pre { background: #f6f8fa; padding: 12px; border-radius: 10px; overflow: auto; white-space: pre-wrap; }
      small { color: #666; }
    </style>
  </head>
  <body>
    <p><a href="/">← Back</a></p>

    <h1>Analysis #{{ item.id }}</h1>
    <p>
      <small>Created:</small> {{ item.created_at }} |
      <small>n:</small> {{ item.n }} |
      <small>model:</small> {{ item.model }}
    </p>

    <div class="card">
      <h2>Summary</h2>
      <pre>{{ item.summary }}</pre>
    </div>

    <div class="card">
      <h2>Log tail</h2>
      <pre>{{ item.log_tail }}</pre>
    </div>
  </body>
</html>ml>
